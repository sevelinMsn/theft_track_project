<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TheftTrack System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login" class="auth-page">

  <main>
    <div class="container auth-container">
      <a href="index.html" class="auth-brand">
        <span class="logo-icon">TT</span>
        <span class="logo-text">TheftTrack</span>
      </a>
      <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in with your email or phone number</p>
        <form id="login-form" class="form" novalidate>
          <div class="form-group">
            <label for="login-identifier">Email or Phone *</label>
            <input type="text" id="login-identifier" name="identifier" placeholder="you@example.com or +250..." required autocomplete="username">
            <span class="form-error" data-error="login-identifier"></span>
          </div>
          <div class="form-group">
            <label for="login-password">Password *</label>
            <input type="password" id="login-password" name="password" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
            <span class="form-error" data-error="login-password"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <p class="auth-footer">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="footer" id="main-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 TheftTrack System. Digital Theft Reporting & Tracking.</p>
      <p class="footer-note">TheftTrack System — PHP/MySQL backend</p>
    </div>
  </footer>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="js/common.js"></script>
</body>
</html>
